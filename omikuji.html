<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロケットおみくじ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #0a0a2e 0%, #1a1a5e 50%, #2d1b4e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Hiragino Kaku Gothic Pro', 'メイリオ', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* 星 */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;
  }

  h1 {
    color: #ffd700;
    font-size: 2.5rem;
    text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
    margin-bottom: 10px;
    letter-spacing: 0.15em;
  }

  .subtitle {
    color: #aaa;
    font-size: 0.95rem;
    margin-bottom: 40px;
  }

  /* ロケットエリア */
  .rocket-area {
    position: relative;
    width: 200px;
    height: 250px;
    margin: 0 auto 40px;
  }

  .rocket {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5rem;
    transition: none;
    filter: drop-shadow(0 0 10px rgba(255,165,0,0.6));
  }

  .rocket.launch {
    animation: rocketLaunch 1.8s ease-in forwards;
  }

  @keyframes rocketLaunch {
    0%   { bottom: 0;    opacity: 1; transform: translateX(-50%) rotate(0deg); }
    10%  { bottom: 5px;  transform: translateX(-52%) rotate(-2deg); }
    20%  { bottom: 15px; transform: translateX(-48%) rotate(2deg); }
    40%  { bottom: 80px; transform: translateX(-50%) rotate(0deg); }
    70%  { bottom: 180px; opacity: 1; transform: translateX(-50%) scale(0.8); }
    100% { bottom: 400px; opacity: 0; transform: translateX(-50%) scale(0.3); }
  }

  /* 炎エフェクト */
  .flame {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.5rem;
    opacity: 0;
    animation: none;
  }

  .flame.active {
    animation: flameAnim 1.8s ease-in forwards;
  }

  @keyframes flameAnim {
    0%   { opacity: 0; transform: translateX(-50%) scale(0); }
    10%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
    50%  { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.5); }
  }

  /* 煙パーティクル */
  .smoke {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(200,200,200,0.7);
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* ボタン */
  .btn {
    background: linear-gradient(135deg, #ff4500, #ff8c00, #ffd700);
    color: white;
    border: none;
    padding: 18px 50px;
    font-size: 1.4rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 0.1em;
    box-shadow: 0 4px 20px rgba(255,100,0,0.5), 0 0 30px rgba(255,200,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(255,100,0,0.7), 0 0 50px rgba(255,200,0,0.5);
  }

  .btn:active:not(:disabled) {
    transform: scale(0.97);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* 結果カード */
  .result-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #1a0a3e, #2d1060);
    border: 2px solid #ffd700;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,100,0,0.2);
    z-index: 100;
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
    min-width: 320px;
  }

  .result-card.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  .result-label {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 8px;
    letter-spacing: 0.2em;
  }

  .result-rank {
    font-size: 3.5rem;
    font-weight: bold;
    margin-bottom: 15px;
    text-shadow: 0 0 20px currentColor;
  }

  .result-message {
    font-size: 1rem;
    color: #ddd;
    line-height: 1.7;
    margin-bottom: 25px;
  }

  .result-close {
    background: transparent;
    border: 1px solid #ffd700;
    color: #ffd700;
    padding: 10px 30px;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s;
  }

  .result-close:hover {
    background: #ffd700;
    color: #1a0a3e;
  }

  /* オーバーレイ */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  /* 打ち上げ花火エフェクト */
  .firework {
    position: fixed;
    pointer-events: none;
    z-index: 98;
    font-size: 2rem;
    animation: burst 0.8s ease-out forwards;
  }
  @keyframes burst {
    0%   { opacity: 1; transform: scale(0.5); }
    50%  { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* カウンター */
  .counter {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #888;
    font-size: 0.85rem;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="overlay" id="overlay" onclick="closeResult()"></div>

<div class="container">
  <h1>🌟 ロケットおみくじ 🌟</h1>
  <p class="subtitle">ボタンを押してロケットを発射！運命を占おう</p>

  <div class="rocket-area" id="rocketArea">
    <div class="rocket" id="rocket">🚀</div>
    <div class="flame" id="flame">🔥</div>
  </div>

  <button class="btn" id="btn" onclick="launch()">🚀 発射！おみくじを引く</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-label">✨ あなたの運勢 ✨</div>
  <div class="result-rank" id="resultRank"></div>
  <div class="result-message" id="resultMessage"></div>
  <button class="result-close" onclick="closeResult()">もう一度引く</button>
</div>

<div class="counter" id="counter"></div>

<script>
  // 星を生成
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${Math.random()*2+1}s;
    `;
    starsEl.appendChild(s);
  }

  // おみくじデータ
  const fortunes = [
    {
      rank: '大吉', color: '#ffd700',
      message: '最高の運気！\n何事も思い通りに進む絶好のチャンス。\n積極的に行動すれば大きな成果が得られる。',
      emoji: '🌟🎉🌟', weight: 5
    },
    {
      rank: '中吉', color: '#00e5ff',
      message: '良い運気が流れている。\n努力が実を結ぶ時期。\n焦らず着実に進めば目標に届く。',
      emoji: '✨💫✨', weight: 15
    },
    {
      rank: '小吉', color: '#69ff47',
      message: 'ちょっぴり良い兆し。\n小さな幸せを大切に。\n人との縁が運を運んでくる。',
      emoji: '🍀🌈🍀', weight: 20
    },
    {
      rank: '吉', color: '#ff9800',
      message: '平穏な運気。\n今は準備の時期。\n地道な積み重ねが後々の大きな幸運を呼ぶ。',
      emoji: '☀️🌸☀️', weight: 25
    },
    {
      rank: '末吉', color: '#ce93d8',
      message: 'もう少しで運が開ける。\n焦らず慎重に。\n諦めずに続けることが鍵。',
      emoji: '🌙⭐🌙', weight: 20
    },
    {
      rank: '凶', color: '#ff5252',
      message: '少し注意が必要な時期。\nでも大丈夫！\n困難は乗り越えた後の糧になる。',
      emoji: '💪🔥💪', weight: 12
    },
    {
      rank: '大凶', color: '#ff1744',
      message: '試練の時かもしれない。\nしかし最大の凶は最大の吉に転ずる！\n諦めなければ必ず光が見える。',
      emoji: '🌑→🌕', weight: 3
    }
  ];

  // 重み付き抽選
  function pickFortune() {
    const total = fortunes.reduce((s, f) => s + f.weight, 0);
    let r = Math.random() * total;
    for (const f of fortunes) {
      r -= f.weight;
      if (r <= 0) return f;
    }
    return fortunes[0];
  }

  let count = parseInt(localStorage.getItem('omikujiCount') || '0');
  updateCounter();

  function updateCounter() {
    document.getElementById('counter').textContent = count > 0 ? `通算 ${count} 回引いた` : '';
  }

  function addSmoke() {
    const area = document.getElementById('rocketArea');
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'smoke';
        s.style.cssText = `
          left: ${45 + Math.random()*10}%;
          bottom: ${Math.random()*20}px;
          animation: smokeRise ${0.8+Math.random()*0.5}s ease-out forwards;
          background: rgba(${180+Math.random()*50},${180+Math.random()*50},${180+Math.random()*50},0.6);
        `;
        area.appendChild(s);
        setTimeout(() => s.remove(), 1500);
      }, i * 100);
    }
  }

  // 煙アニメーション追加
  const smokeStyle = document.createElement('style');
  smokeStyle.textContent = `
    @keyframes smokeRise {
      0%   { transform: translateX(-50%) scale(1); opacity: 0.7; }
      100% { transform: translateX(calc(-50% + ${(Math.random()-0.5)*60}px)) translateY(-60px) scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(smokeStyle);

  function spawnFireworks(fortune) {
    const emojis = ['✨','⭐','🌟','💫','🎉','🎊','🎆'];
    const count = fortune.rank === '大吉' ? 12 : fortune.rank.includes('吉') ? 6 : 3;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const fw = document.createElement('div');
        fw.className = 'firework';
        fw.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        fw.style.cssText = `
          top: ${20+Math.random()*60}%;
          left: ${10+Math.random()*80}%;
          animation-delay: ${Math.random()*0.3}s;
        `;
        document.body.appendChild(fw);
        setTimeout(() => fw.remove(), 1200);
      }, i * 80);
    }
  }

  function launch() {
    const btn = document.getElementById('btn');
    const rocket = document.getElementById('rocket');
    const flame = document.getElementById('flame');

    btn.disabled = true;

    // リセット
    rocket.className = 'rocket';
    flame.className = 'flame';
    void rocket.offsetWidth;

    // 発射
    rocket.classList.add('launch');
    flame.classList.add('active');
    addSmoke();

    const fortune = pickFortune();

    setTimeout(() => {
      spawnFireworks(fortune);
    }, 1200);

    setTimeout(() => {
      showResult(fortune);
    }, 2000);
  }

  function showResult(fortune) {
    const card = document.getElementById('resultCard');
    const overlay = document.getElementById('overlay');
    const rankEl = document.getElementById('resultRank');
    const msgEl = document.getElementById('resultMessage');

    rankEl.textContent = fortune.emoji + ' ' + fortune.rank + ' ' + fortune.emoji;
    rankEl.style.color = fortune.color;
    msgEl.textContent = fortune.message.replace(/\n/g, '\n');
    msgEl.style.whiteSpace = 'pre-line';

    overlay.classList.add('show');
    card.classList.add('show');

    count++;
    localStorage.setItem('omikujiCount', count);
    updateCounter();
  }

  function closeResult() {
    const card = document.getElementById('resultCard');
    const overlay = document.getElementById('overlay');
    const rocket = document.getElementById('rocket');
    const flame = document.getElementById('flame');
    const btn = document.getElementById('btn');

    card.classList.remove('show');
    overlay.classList.remove('show');

    // ロケットを元の位置に戻す
    setTimeout(() => {
      rocket.className = 'rocket';
      flame.className = 'flame';
      btn.disabled = false;
    }, 400);
  }
</script>
</body>
</html>
